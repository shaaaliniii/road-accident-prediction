<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Visualization</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://bootswatch.com/4/flatly/bootstrap.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <style>
        body { font-family: Verdana, sans-serif; margin:0 }
        .mySlides { display: none }
        img { vertical-align: middle; }

        .slideshow-container {
            max-width: 1000px;
            position: relative;
            margin: auto;
            margin-top: 30px;
        }

        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            padding: 16px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            background-color: rgba(0,0,0,0.5);
        }

        .next { right: 0; }

        .text {
            color: black;
            font-size: 15px;
            text-align: center;
            margin-top: 10px;
        }

        .dot {
            cursor: pointer;
            height: 15px;
            width: 15px;
            margin: 5px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
        }

        .active { background-color: #717171; }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="header">
  <a href="/" class="logo">ROAD ACCIDENTS</a>
  <div class="header-right">
    <a href="/">Home</a>
    <a href="/map">Map</a>
    <a href="/police">Police</a>
    <a href="/visualization" class="active">Visualization</a>
  </div>
</div>

<!-- SLIDES -->
<div class="slideshow-container">

<div class="mySlides">
  <img src="/static/1.png" style="width:100%">
  <div class="text">Thursday has highest accidents.</div>
</div>

<div class="mySlides">
  <img src="/static/2.png" style="width:100%">
  <div class="text">Most accidents happen after noon.</div>
</div>

<div class="mySlides">
  <img src="/static/3.png" style="width:100%">
  <div class="text">Drivers aged 25–35 are most involved.</div>
</div>

<div class="mySlides">
  <img src="/static/4.png" style="width:100%">
  <div class="text">Most accidents at speed limit 30.</div>
</div>

<div class="mySlides">
  <img src="/static/5.png" style="width:100%">
  <div class="text">Low correlation between variables.</div>
</div>

<a class="prev" onclick="plusSlides(-1)">❮</a>
<a class="next" onclick="plusSlides(1)">❯</a>

</div>

<!-- DOTS -->
<div style="text-align:center">
  <span class="dot" onclick="currentSlide(1)"></span>
  <span class="dot" onclick="currentSlide(2)"></span>
  <span class="dot" onclick="currentSlide(3)"></span>
  <span class="dot" onclick="currentSlide(4)"></span>
  <span class="dot" onclick="currentSlide(5)"></span>
</div>

<!-- JS -->
<script>
let slideIndex = 1;
showSlides(slideIndex);

function plusSlides(n) {
    showSlides(slideIndex += n);
}

function currentSlide(n) {
    showSlides(slideIndex = n);
}

function showSlides(n) {
    let slides = document.getElementsByClassName("mySlides");
    let dots = document.getElementsByClassName("dot");

    if (n > slides.length) slideIndex = 1;
    if (n < 1) slideIndex = slides.length;

    for (let i = 0; i < slides.length; i++)
        slides[i].style.display = "none";

    for (let i = 0; i < dots.length; i++)
        dots[i].classList.remove("active");

    slides[slideIndex - 1].style.display = "block";
    dots[slideIndex - 1].classList.add("active");
}
</script>

<!-- FOOTER -->
<footer class="footer text-center mt-5">
    Copyright &copy; tracker.com
</footer>

</body>
</html>
